name: 🐛 Bug report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please **never include your `GROQ_API_KEY`** or
        any other secret in this issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server with `uv run uvicorn backend:app`
        2. Ask "..."
        3. See error
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of VerdictAI?
      options:
        - Legal Q&A / chat
        - Retrieval (hybrid, BM25, reranker)
        - Case Intelligence Suite
        - Case Simulator
        - Translation / bilingual
        - Frontend / UI
        - Setup / installation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output (redact secrets).
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version (e.g. Windows 11, Python 3.13)"
