name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        # The suite is fully offline: LLMs and the retriever are faked, so no
        # GROQ_API_KEY, network, or model download is required.
        env:
          GROQ_API_KEY: test-key-not-used
        run: uv run pytest -q

  lint:
    name: Frontend syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check ES module syntax
        run: |
          for f in $(find static/js -name '*.js'); do
            node --check "$f" || exit 1
          done
          echo "All JS modules parsed successfully."
