<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · VerdictAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="/static/theme-config.js"></script>
  <link rel="stylesheet" href="/static/base.css" />
</head>

<body class="h-full bg-slate-50 font-sans text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <main class="flex min-h-dvh items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">
      <!-- Brand -->
      <div class="mb-8 flex flex-col items-center text-center">
        <span class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-600 to-brand-800 text-white shadow-lg">
          <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v18M5 7h14M7 7l-3 6a3 3 0 0 0 6 0zM17 7l3 6a3 3 0 0 1-6 0z"/></svg>
        </span>
        <h1 class="font-display text-2xl font-semibold tracking-tight">VerdictAI</h1>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Secure legal intelligence platform</p>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <!-- Tabs -->
        <div role="tablist" aria-label="Authentication" class="mb-5 grid grid-cols-2 gap-1 rounded-lg bg-slate-100 p-1 dark:bg-slate-800">
          <button id="tabLogin" role="tab" aria-selected="true" class="rounded-md px-3 py-1.5 text-sm font-semibold transition-colors focus-ring">Sign in</button>
          <button id="tabRegister" role="tab" aria-selected="false" class="rounded-md px-3 py-1.5 text-sm font-semibold transition-colors focus-ring">Create account</button>
        </div>

        <form id="authForm" novalidate>
          <div id="nameField" class="mb-3 hidden">
            <label for="fullName" class="mb-1 block text-xs font-semibold text-slate-500 dark:text-slate-400">Full name</label>
            <input id="fullName" type="text" autocomplete="name" maxlength="120"
              class="w-full rounded-lg border-slate-300 bg-white text-sm focus:border-brand-400 focus:ring-brand-500/20 dark:border-slate-700 dark:bg-slate-950" />
          </div>

          <label for="email" class="mb-1 block text-xs font-semibold text-slate-500 dark:text-slate-400">Email</label>
          <input id="email" type="email" required autocomplete="username"
            class="mb-3 w-full rounded-lg border-slate-300 bg-white text-sm focus:border-brand-400 focus:ring-brand-500/20 dark:border-slate-700 dark:bg-slate-950" />

          <label for="password" class="mb-1 block text-xs font-semibold text-slate-500 dark:text-slate-400">Password</label>
          <input id="password" type="password" required autocomplete="current-password" minlength="12"
            class="w-full rounded-lg border-slate-300 bg-white text-sm focus:border-brand-400 focus:ring-brand-500/20 dark:border-slate-700 dark:bg-slate-950" />
          <p id="pwHint" class="mb-4 mt-1 hidden text-[11px] leading-relaxed text-slate-400 dark:text-slate-500">
            At least 12 characters, using three of: lowercase, uppercase, digit, symbol.
          </p>
          <div id="pwSpacer" class="mb-4"></div>

          <div id="error" role="alert" class="mb-3 hidden rounded-lg bg-rose-50 p-3 text-sm text-rose-700 dark:bg-rose-950/50 dark:text-rose-300"></div>
          <div id="notice" role="status" class="mb-3 hidden rounded-lg bg-emerald-50 p-3 text-sm text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300"></div>

          <button id="submitBtn" type="submit"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-brand-700 focus-ring disabled:opacity-60">
            Sign in
          </button>
        </form>

        <button id="forgot" type="button" class="mt-3 w-full text-center text-xs font-medium text-slate-400 underline-offset-2 hover:text-brand-600 hover:underline focus-ring dark:text-slate-500">
          Forgot your password?
        </button>
      </div>

      <p class="mt-6 text-center text-[11px] leading-relaxed text-slate-400 dark:text-slate-500">
        The first account created becomes the <strong>Administrator</strong>.<br />
        VerdictAI is an educational legal tool — not legal advice.
      </p>
    </div>
  </main>

  <script type="module" src="/static/js/login.js"></script>
</body>
</html>
